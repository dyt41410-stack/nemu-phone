<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ñemu Phone v2</title>
    <style>
        :root { --primary: #30d158; --danger: #ff453a; --bg: #000; --card: #1c1c1e; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .screen { display: none; flex: 1; flex-direction: column; padding: 20px; }
        .active { display: flex; }
        .hero { text-align: center; margin-top: 50px; margin-bottom: 30px; }
        .hero h1 { font-size: 3rem; color: var(--primary); }
        .card { background: var(--card); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        input { background: #2c2c2e; border: none; border-radius: 12px; padding: 18px; color: #fff; font-size: 1.1rem; }
        .btn { border: none; border-radius: 12px; padding: 18px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #000; }
        .status-bar { display: flex; justify-content: space-between; padding: 10px 0; color: var(--primary); font-size: 0.9rem; }
        .dial-display { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; height: 100px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 320px; margin: 0 auto; }
        .key { width: 75px; height: 75px; border-radius: 50%; background: #2c2c2e; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; }
        .key.call-btn { background: var(--primary); color: #000; }
        .video-container { position: fixed; inset: 0; background: #000; z-index: 100; display: none; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 15px; border: 2px solid #fff; object-fit: cover; }
        .controls { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 30px; }
        .btn-round { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 1.5rem; cursor: pointer; }
        #incomingModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="loginScreen" class="screen active">
        <div class="hero"><h1>Ñemu</h1><p>Comunicación Directa</p></div>
        <div class="card">
            <input type="tel" id="myNumber" placeholder="Tu número">
            <button class="btn btn-primary" onclick="initApp()">EMPEZAR</button>
        </div>
    </div>
    <div id="mainScreen" class="screen">
        <div class="status-bar"><span>● CONECTADO</span><span id="displayMyId">ID: ----</span></div>
        <div class="dial-display" id="dialDisplay"></div>
        <div class="keypad">
            <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button>
            <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button>
            <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button>
            <button class="key" onclick="press('*')">*</button><button class="key" onclick="press('0')">0</button><button class="key" onclick="press('#')">#</button>
            <div style="grid-column: span 1"></div><button class="key call-btn" onclick="startCall()">📞</button><button class="key" style="background:#444" onclick="press('DEL')">⌫</button>
        </div>
    </div>
    <div id="videoScreen" class="video-container">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="controls"><button id="camBtn" class="btn-round" style="background:rgba(255,255,255,0.2);color:#fff;" onclick="toggleVid()">📷</button><button class="btn-round" style="background:#ff453a;color:#fff;" onclick="hangup()">📵</button><button id="micBtn" class="btn-round" style="background:rgba(255,255,255,0.2);color:#fff;" onclick="toggleMic()">🎙️</button></div>
    </div>
    <div id="incomingModal">
        <h1 id="incName">Llamada...</h1>
        <div style="display:flex;gap:40px;margin-top:40px;">
            <button class="btn-round" style="background:#ff453a;color:#fff;" onclick="rejectCall()">📵</button>
            <button class="btn-round" style="background:#30d158;color:#000;" onclick="answerCall()">📞</button>
        </div>
    </div>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        let peer, localStream, currentCall, dialString = "", ringInterval, audioCtx;
        function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        async function initApp(){
            const n = document.getElementById('myNumber').value; if(!n) return;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                document.getElementById('localVideo').srcObject = localStream;
                peer = new Peer('nemu-'+n, {host:'0.peerjs.com', port:443, secure:true});
                peer.on('open', () => { document.getElementById('displayMyId').innerText = "ID: "+n; show('mainScreen'); });
                peer.on('call', call => { window.incomingCall=call; document.getElementById('incName').innerText="De: "+call.peer.replace('nemu-',''); document.getElementById('incomingModal').style.display='flex'; playRing(660, 880); });
            } catch(e){ alert("Permiso de camara necesario"); }
        }
        function press(k){ if(k==='DEL') dialString=dialString.slice(0,-1); else if(dialString.length<10) dialString+=k; document.getElementById('dialDisplay').innerText=dialString; }
        function startCall(){ if(!dialString) return; document.getElementById('videoScreen').style.display='block'; playRing(440,480); currentCall=peer.call('nemu-'+dialString, localStream); handle(currentCall); }
        function handle(call){
            call.on('stream', rs => { stopRing(); document.getElementById('remoteVideo').srcObject=rs; });
            call.on('close', hangup);
        }
        function answerCall(){ document.getElementById('incomingModal').style.display='none'; stopRing(); document.getElementById('videoScreen').style.display='block'; window.incomingCall.answer(localStream); handle(window.incomingCall); }
        function rejectCall(){ document.getElementById('incomingModal').style.display='none'; stopRing(); window.incomingCall.close(); }
        function hangup(){ stopRing(); if(currentCall) currentCall.close(); document.getElementById('videoScreen').style.display='none'; show('mainScreen'); dialString=""; document.getElementById('dialDisplay').innerText=""; }
        function playRing(f1,f2){ stopRing(); audioCtx=new(window.AudioContext||window.webkitAudioContext)(); ringInterval=setInterval(()=>{ const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(f1,audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(f2,audioCtx.currentTime+0.4); g.gain.setValueAtTime(0.1,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.4); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.5); },1000); }
        function stopRing(){ if(ringInterval) clearInterval(ringInterval); }
        function toggleVid(){
            let v = localStream.getVideoTracks()[0];
            v.enabled = !v.enabled;
            document.getElementById('camBtn').style.background = v.enabled ? 'rgba(255,255,255,0.2)' : '#ff453a';
            document.getElementById('camBtn').innerText = v.enabled ? '📷' : '🚫';
        }
        function toggleMic(){
            let a = localStream.getAudioTracks()[0];
            a.enabled = !a.enabled;
            document.getElementById('micBtn').style.background = a.enabled ? 'rgba(255,255,255,0.2)' : '#ff453a';
            document.getElementById('micBtn').innerText = a.enabled ? '🎙️' : '🔇';
        }
    </script>
</body>
</html>
