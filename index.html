<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Nemu Test</title>
</head>
<body style='background:#000; color:#fff; font-family:sans-serif; text-align:center;'>
    <h2>Telefono de Nemu</h2>
    
    <div id='setup'>
        <p>1. Activa tu camara:</p>
        <button onclick='initCam()' style='padding:20px; background:green; color:white;'>ACTIVAR CAMARA</button>
    </div>

    <div id='login' style='display:none;'>
        <p>2. Tu Numero:</p>
        <input id='myId' type='tel' placeholder='Ej: 1001' style='padding:10px;'>
        <button onclick='connect()' style='padding:10px;'>CONECTAR</button>
    </div>

    <div id='dialer' style='display:none;'>
        <p>Conectado como: <b id='showId'></b></p>
        <input id='destId' type='tel' placeholder='Llamar a...' style='padding:10px;'>
        <button onclick='makeCall()' style='padding:10px; background:blue; color:white;'>LLAMAR</button>
        <br><br>
        <video id='remote' autoplay playsinline style='width:90%; background:#222; min-height:200px;'></video>
        <video id='local' autoplay playsinline muted style='width:100px; border:1px solid #fff;'></video>
    </div>

    <script src='https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js'></script>
    <script>
        let myStream, peer;

        async function initCam() {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                document.getElementById('local').srcObject = myStream;
                document.getElementById('setup').style.display = 'none';
                document.getElementById('login').style.display = 'block';
            } catch(e) {
                alert('Error de camara: ' + e.message + '. REVISA LOS PERMISOS EN CHROME.');
            }
        }

        function connect() {
            const id = document.getElementById('myId').value;
            if(!id) return;
            peer = new Peer('nemu-' + id, {host:'0.peerjs.com', port:443, secure:true});
            peer.on('open', () => {
                document.getElementById('showId').innerText = id;
                document.getElementById('login').style.display = 'none';
                document.getElementById('dialer').style.display = 'block';
            });
            peer.on('call', call => {
                if(confirm('Te llaman! Contestar?')) {
                    call.answer(myStream);
                    call.on('stream', rs => document.getElementById('remote').srcObject = rs);
                }
            });
        }

        function makeCall() {
            const dest = document.getElementById('destId').value;
            const call = peer.call('nemu-' + dest, myStream);
            call.on('stream', rs => document.getElementById('remote').srcObject = rs);
        }
    </script>
</body>
</html>
